<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weatherly | Weather App</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="./styles/main.css" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="default-theme">
    <!-- Background Glow -->
    <div class="background-glow"></div>

    <!-- Main App -->
    <main class="app">
      <!-- App Header -->
      <header class="app-header">
        <h1 class="app-title">Weatherly</h1>
        <p class="app-subtitle">Real-time atmospheric weather experience</p>
      </header>

      <!-- Search Section -->
      <section class="search-section">
        <form class="search-form">
          <div class="search-input-wrapper">
            <input
              type="text"
              class="search-input"
              placeholder="Enter city name..."
              autocomplete="off"
            />
            <button type="submit" class="search-button">Search</button>
          </div>
        </form>
      </section>

      <!-- Weather Card -->
      <section class="weather-card">
        <!-- Top Info -->
        <div class="weather-card-top">
          <div class="weather-card-location-group">
            <p class="weather-card-location">Jaipur, IN</p>

            <p class="weather-card-date">sunday, 17 May</p>
          </div>
        </div>

        <!-- Main Weather -->
        <div class="weather-card-main">
          <div class="weather-card-icon">☁️</div>
          <h2 class="weather-card-temperature">32°</h2>
          <p class="weather-card-condition">Cloudy</p>
        </div>

        <!-- Weather Details -->
        <div class="weather-card-details">
          <div class="weather-detail">
            <p class="weather-detail-label">Feels Like</p>
            <p class="weather-detail-value">35°</p>
          </div>

          <div class="weather-detail">
            <p class="weather-detail-label">Humidity</p>
            <p class="weather-detail-value">40%</p>
          </div>
          <div class="weather-detail">
            <p class="weather-detail-label">Wind</p>
            <p class="weather-detail-value">8 km/h</p>
          </div>
        </div>
      </section>

      <!-- Warning Banner -->
      <section class="weather-alert weather-alert--calm">
        <p class="weather-alert-text">
          ⚠ Extreme heat detected. Stay hydrated and avoid direct sunlight.
        </p>
      </section>

      <!-- Error Message -->
      <section class="error-message hidden">
        <p class="error-message-text">
          CIty not found. Please try another location.
        </p>
      </section>

      <!-- loader -->
      <section class="loader hidden">
        <div class="loader-circle"></div>
        <p class="loader-text">Fetching weather...</p>
      </section>
    </main>
    <!-- Main JavaScript -->
    <script src="./scripts/main.js"></script>
  </body>
</html>
